<div class="flex flex-col lg:flex-row gap-6 p-4 bg-slate-50 min-h-screen">
    <!-- Main Schedule Grid -->
    <div class="flex-grow bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
        <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-20">
            <h2 class="text-2xl font-bold text-[#2d3a82]">Lịch cá nhân</h2>
            <div class="flex items-center gap-4 text-slate-500">
                <div class="flex items-center gap-2 bg-slate-50 px-3 py-1 rounded-full border border-slate-100">
                    <i class="far fa-clock"></i>
                    <span class="text-sm font-medium">GMT+7</span>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <div class="min-w-[1000px]">
                <!-- Header Row -->
                <div class="grid grid-cols-8 border-b border-slate-100 bg-slate-50/50">
                    <div class="p-4 border-r border-slate-100 flex items-center justify-center">
                        <i class="fas fa-clock text-slate-400"></i>
                    </div>
                    <div *ngFor="let day of weekDays"
                        class="p-4 border-r border-slate-100 text-center transition-colors"
                        [ngClass]="{'bg-blue-600 !text-white': isSelectedDay(day.name)}">
                        <div class="text-sm font-bold"
                            [ngClass]="isSelectedDay(day.name) ? 'text-white' : 'text-slate-900'">{{ day.date }}</div>
                        <div class="text-xs font-medium uppercase tracking-wider"
                            [ngClass]="isSelectedDay(day.name) ? 'text-blue-100' : 'text-slate-500'">{{ day.label }}
                        </div>
                    </div>
                </div>

                <!-- Time Grid -->
                <div class="relative">
                    <div *ngFor="let slot of timeSlots"
                        class="grid grid-cols-8 border-b border-slate-50 group min-h-[100px]">
                        <!-- Time Label -->
                        <div
                            class="p-4 border-r border-slate-100 flex flex-col items-center justify-start bg-slate-50/20 group-hover:bg-slate-50 transition-colors">
                            <span class="text-sm font-bold text-slate-700">{{ slot }}</span>
                        </div>

                        <!-- Day Columns -->
                        <div *ngFor="let day of weekDays"
                            class="border-r border-slate-50 p-2 relative min-h-[100px] transition-colors"
                            [ngClass]="{'bg-blue-50/30': isSelectedDay(day.name)}">
                            <!-- Render Schedule Items with proportional heights -->
                            <div *ngFor="let item of getItemsForDayAndTime(day.date, slot); let i = index"
                                class="absolute left-2 right-2 p-3 rounded-xl shadow-sm border-l-4 transition-all hover:scale-[1.02] hover:shadow-md cursor-pointer z-10"
                                [ngClass]="[item.color, item.textColor, 'border-white/20']"
                                [style.height.px]="calculateHeight(item.durationMinutes)"
                                [style.top.px]="calculateTopOffset(item.startTime, slot)"
                                [style.left]="i > 0 ? 'calc(50% + 4px)' : '8px'"
                                [style.right]="i > 0 ? '8px' : 'calc(50% + 4px)'">
                                <div class="text-[11px] font-bold opacity-90 truncate">{{ item.title }}</div>
                                <div class="text-[10px] mt-1 font-medium bg-black/10 px-1.5 py-0.5 rounded w-max">{{
                                    item.time }} ({{ item.slot }})</div>
                                <div class="flex items-center justify-between mt-2">
                                    <div class="text-[10px] font-bold">{{ item.room }}</div>
                                    <div class="flex gap-1">
                                        <button
                                            class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors">
                                            <i class="fas fa-minus text-[8px]"></i>
                                        </button>
                                        <button
                                            class="w-5 h-5 rounded-full bg-white/20 flex items-center justify-center hover:bg-white/30 transition-colors">
                                            <i class="fas fa-plus text-[8px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sidebar with Mini Calendar -->
    <div class="lg:w-[350px] flex-shrink-0 space-y-6">
        <app-mini-calendar (dateSelected)="onDateSelected($event)"></app-mini-calendar>
    </div>
</div>
